<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseHabits</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Painel pessoal</p>
        <h1>PulseHabits</h1>
        <p class="subtitle">Acompanhe habitos, metas semanais e progresso diario com backend e banco SQLite.</p>
      </div>
      <div class="scoreboard" aria-label="Resumo de progresso">
        <span id="todayScore">0%</span>
        <small>concluido hoje</small>
      </div>
    </section>

    <section class="stats" aria-label="Indicadores">
      <article>
        <span id="totalHabits">0</span>
        <p>habitos ativos</p>
      </article>
      <article>
        <span id="doneToday">0</span>
        <p>feitos hoje</p>
      </article>
      <article>
        <span id="weekAverage">0%</span>
        <p>media semanal</p>
      </article>
    </section>

    <section class="workspace">
      <form id="habitForm" class="panel">
        <h2>Novo habito</h2>
        <label>
          Nome
          <input id="name" name="name" required placeholder="Ex: Praticar ingles">
        </label>
        <label>
          Categoria
          <select id="category" name="category">
            <option>Estudos</option>
            <option>Saude</option>
            <option>Foco</option>
            <option>Trabalho</option>
            <option>Geral</option>
          </select>
        </label>
        <label>
          Meta semanal
          <input id="weeklyGoal" name="weeklyGoal" type="number" min="1" max="7" value="5">
        </label>
        <button type="submit">Adicionar</button>
        <p id="formMessage" class="message" role="status"></p>
      </form>

      <section class="panel list-panel">
        <div class="list-header">
          <h2>Meus habitos</h2>
          <select id="filter">
            <option value="Todos">Todos</option>
            <option>Estudos</option>
            <option>Saude</option>
            <option>Foco</option>
            <option>Trabalho</option>
            <option>Geral</option>
          </select>
        </div>
        <div id="habitList" class="habit-list"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
